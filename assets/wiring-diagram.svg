<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 740" font-family="Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="740" rx="8" fill="#ffffff"/>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">Raspberry Pi 4 — Padel Access Control Pinout</text>
  <text x="500" y="50" text-anchor="middle" font-size="12" fill="#888">BCM numbering — All relays active-LOW (GPIO LOW = relay ON)</text>

  <!-- Pi Board -->
  <rect x="230" y="62" width="540" height="590" rx="14" fill="#2e7d32" stroke="#1b5e20" stroke-width="2.5" filter="url(#shadow)"/>

  <!-- Board holes -->
  <circle cx="250" cy="82" r="5" fill="none" stroke="#66bb6a" stroke-width="1.5"/>
  <circle cx="750" cy="82" r="5" fill="none" stroke="#66bb6a" stroke-width="1.5"/>
  <circle cx="250" cy="632" r="5" fill="none" stroke="#66bb6a" stroke-width="1.5"/>
  <circle cx="750" cy="632" r="5" fill="none" stroke="#66bb6a" stroke-width="1.5"/>

  <!-- USB/ETH ports -->
  <rect x="280" y="610" width="50" height="32" rx="3" fill="#555" stroke="#777" stroke-width="1"/>
  <text x="305" y="630" text-anchor="middle" font-size="8" fill="#ccc">USB</text>
  <rect x="340" y="610" width="50" height="32" rx="3" fill="#555" stroke="#777" stroke-width="1"/>
  <text x="365" y="630" text-anchor="middle" font-size="8" fill="#ccc">USB</text>
  <rect x="410" y="610" width="60" height="32" rx="3" fill="#555" stroke="#777" stroke-width="1"/>
  <text x="440" y="630" text-anchor="middle" font-size="8" fill="#ccc">ETH</text>

  <!-- GPIO Header background -->
  <rect x="340" y="78" width="320" height="518" rx="5" fill="#1b5e20"/>

  <!-- Column headers -->
  <text x="440" y="95" text-anchor="middle" font-size="10" fill="#a5d6a7" font-weight="bold">Pin#</text>
  <text x="560" y="95" text-anchor="middle" font-size="10" fill="#a5d6a7" font-weight="bold">Pin#</text>

  <!-- ══════════════════════════════════════ -->
  <!-- LEFT labels (outside the board)       -->
  <!-- RIGHT labels (outside the board)      -->
  <!-- Pins inside the board                 -->
  <!-- ══════════════════════════════════════ -->

  <!-- Row 1: Pin 1 (3.3V) / Pin 2 (5V) -->
  <text x="225" y="116" text-anchor="end" font-size="11" fill="#e65100" font-weight="bold">3.3V</text>
  <rect x="415" y="102" width="50" height="20" rx="4" fill="#ff8f00"/>
  <text x="440" y="116" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">1</text>
  <rect x="535" y="102" width="50" height="20" rx="4" fill="#c62828"/>
  <text x="560" y="116" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">2</text>
  <text x="775" y="116" text-anchor="start" font-size="11" fill="#c62828" font-weight="bold">5V</text>

  <!-- Row 2: Pin 3 (GPIO2 SDA) / Pin 4 (5V) -->
  <text x="225" y="140" text-anchor="end" font-size="11" fill="#1565c0" font-weight="bold">GPIO2 SDA</text>
  <rect x="415" y="126" width="50" height="20" rx="4" fill="#1565c0"/>
  <text x="440" y="140" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">3</text>
  <rect x="535" y="126" width="50" height="20" rx="4" fill="#c62828"/>
  <text x="560" y="140" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">4</text>
  <text x="775" y="140" text-anchor="start" font-size="11" fill="#c62828" font-weight="bold">5V</text>

  <!-- Row 3: Pin 5 (GPIO3 SCL) / Pin 6 (GND) -->
  <text x="225" y="164" text-anchor="end" font-size="11" fill="#1565c0" font-weight="bold">GPIO3 SCL</text>
  <rect x="415" y="150" width="50" height="20" rx="4" fill="#1565c0"/>
  <text x="440" y="164" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">5</text>
  <rect x="535" y="150" width="50" height="20" rx="4" fill="#333"/>
  <text x="560" y="164" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">6</text>
  <text x="775" y="164" text-anchor="start" font-size="11" fill="#555">GND</text>

  <!-- Row 4: Pin 7 (GPIO4) / Pin 8 (GPIO14) -->
  <text x="225" y="188" text-anchor="end" font-size="11" fill="#aaa">GPIO4</text>
  <rect x="415" y="174" width="50" height="20" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5"/>
  <text x="440" y="188" text-anchor="middle" font-size="10" fill="#777" font-weight="bold">7</text>
  <rect x="535" y="174" width="50" height="20" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5"/>
  <text x="560" y="188" text-anchor="middle" font-size="10" fill="#777" font-weight="bold">8</text>
  <text x="775" y="188" text-anchor="start" font-size="11" fill="#aaa">GPIO14</text>

  <!-- Row 5: Pin 9 (GND) / Pin 10 (GPIO15) -->
  <text x="225" y="212" text-anchor="end" font-size="11" fill="#555">GND</text>
  <rect x="415" y="198" width="50" height="20" rx="4" fill="#333"/>
  <text x="440" y="212" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">9</text>
  <rect x="535" y="198" width="50" height="20" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5"/>
  <text x="560" y="212" text-anchor="middle" font-size="10" fill="#777" font-weight="bold">10</text>
  <text x="775" y="212" text-anchor="start" font-size="11" fill="#aaa">GPIO15</text>

  <!-- Row 6: Pin 11 (GPIO17 DOOR) / Pin 12 (GPIO18) -->
  <text x="225" y="236" text-anchor="end" font-size="11" fill="#d32f2f" font-weight="bold">GPIO17 DOOR</text>
  <rect x="415" y="222" width="50" height="20" rx="4" fill="#d32f2f"/>
  <text x="440" y="236" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">11</text>
  <rect x="535" y="222" width="50" height="20" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5"/>
  <text x="560" y="236" text-anchor="middle" font-size="10" fill="#777" font-weight="bold">12</text>
  <text x="775" y="236" text-anchor="start" font-size="11" fill="#aaa">GPIO18</text>

  <!-- Row 7: Pin 13 (GPIO27 LIGHT1) / Pin 14 (GND) -->
  <text x="225" y="260" text-anchor="end" font-size="11" fill="#e65100" font-weight="bold">GPIO27 LIGHT1</text>
  <rect x="415" y="246" width="50" height="20" rx="4" fill="#e65100"/>
  <text x="440" y="260" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">13</text>
  <rect x="535" y="246" width="50" height="20" rx="4" fill="#333"/>
  <text x="560" y="260" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">14</text>
  <text x="775" y="260" text-anchor="start" font-size="11" fill="#555">GND</text>

  <!-- Row 8: Pin 15 (GPIO22 LIGHT2) / Pin 16 (GPIO23) -->
  <text x="225" y="284" text-anchor="end" font-size="11" fill="#e65100" font-weight="bold">GPIO22 LIGHT2</text>
  <rect x="415" y="270" width="50" height="20" rx="4" fill="#e65100"/>
  <text x="440" y="284" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">15</text>
  <rect x="535" y="270" width="50" height="20" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5"/>
  <text x="560" y="284" text-anchor="middle" font-size="10" fill="#777" font-weight="bold">16</text>
  <text x="775" y="284" text-anchor="start" font-size="11" fill="#aaa">GPIO23</text>

  <!-- Row 9: Pin 17 (3.3V) / Pin 18 (GPIO24 BUZZER) -->
  <text x="225" y="308" text-anchor="end" font-size="11" fill="#e65100" font-weight="bold">3.3V</text>
  <rect x="415" y="294" width="50" height="20" rx="4" fill="#ff8f00"/>
  <text x="440" y="308" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">17</text>
  <rect x="535" y="294" width="50" height="20" rx="4" fill="#6a1b9a"/>
  <text x="560" y="308" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">18</text>
  <text x="775" y="308" text-anchor="start" font-size="11" fill="#6a1b9a" font-weight="bold">GPIO24 BUZZER</text>

  <!-- Row 10: Pin 19 (GPIO10) / Pin 20 (GND) -->
  <text x="225" y="332" text-anchor="end" font-size="11" fill="#aaa">GPIO10</text>
  <rect x="415" y="318" width="50" height="20" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5"/>
  <text x="440" y="332" text-anchor="middle" font-size="10" fill="#777" font-weight="bold">19</text>
  <rect x="535" y="318" width="50" height="20" rx="4" fill="#333"/>
  <text x="560" y="332" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">20</text>
  <text x="775" y="332" text-anchor="start" font-size="11" fill="#555">GND</text>

  <!-- Row 11: Pin 21 (GPIO9) / Pin 22 (GPIO25) -->
  <text x="225" y="356" text-anchor="end" font-size="11" fill="#aaa">GPIO9</text>
  <rect x="415" y="342" width="50" height="20" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5"/>
  <text x="440" y="356" text-anchor="middle" font-size="10" fill="#777" font-weight="bold">21</text>
  <rect x="535" y="342" width="50" height="20" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5"/>
  <text x="560" y="356" text-anchor="middle" font-size="10" fill="#777" font-weight="bold">22</text>
  <text x="775" y="356" text-anchor="start" font-size="11" fill="#aaa">GPIO25</text>

  <!-- Row 12: Pin 23 (GPIO11) / Pin 24 (GPIO8) -->
  <text x="225" y="380" text-anchor="end" font-size="11" fill="#aaa">GPIO11</text>
  <rect x="415" y="366" width="50" height="20" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5"/>
  <text x="440" y="380" text-anchor="middle" font-size="10" fill="#777" font-weight="bold">23</text>
  <rect x="535" y="366" width="50" height="20" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5"/>
  <text x="560" y="380" text-anchor="middle" font-size="10" fill="#777" font-weight="bold">24</text>
  <text x="775" y="380" text-anchor="start" font-size="11" fill="#aaa">GPIO8</text>

  <!-- Row 13: Pin 25 (GND) / Pin 26 (GPIO7) -->
  <text x="225" y="404" text-anchor="end" font-size="11" fill="#555">GND</text>
  <rect x="415" y="390" width="50" height="20" rx="4" fill="#333"/>
  <text x="440" y="404" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">25</text>
  <rect x="535" y="390" width="50" height="20" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5"/>
  <text x="560" y="404" text-anchor="middle" font-size="10" fill="#777" font-weight="bold">26</text>
  <text x="775" y="404" text-anchor="start" font-size="11" fill="#aaa">GPIO7</text>

  <!-- Row 14: Pin 27 (ID_SD) / Pin 28 (ID_SC) -->
  <text x="225" y="428" text-anchor="end" font-size="11" fill="#aaa">ID_SD</text>
  <rect x="415" y="414" width="50" height="20" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5"/>
  <text x="440" y="428" text-anchor="middle" font-size="10" fill="#777" font-weight="bold">27</text>
  <rect x="535" y="414" width="50" height="20" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5"/>
  <text x="560" y="428" text-anchor="middle" font-size="10" fill="#777" font-weight="bold">28</text>
  <text x="775" y="428" text-anchor="start" font-size="11" fill="#aaa">ID_SC</text>

  <!-- Row 15: Pin 29 (GPIO5 ROW1) / Pin 30 (GND) -->
  <text x="225" y="452" text-anchor="end" font-size="11" fill="#2e7d32" font-weight="bold">GPIO5 ROW1</text>
  <rect x="415" y="438" width="50" height="20" rx="4" fill="#2e7d32"/>
  <text x="440" y="452" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">29</text>
  <rect x="535" y="438" width="50" height="20" rx="4" fill="#333"/>
  <text x="560" y="452" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">30</text>
  <text x="775" y="452" text-anchor="start" font-size="11" fill="#555">GND</text>

  <!-- Row 16: Pin 31 (GPIO6 ROW2) / Pin 32 (GPIO12 COL1) -->
  <text x="225" y="476" text-anchor="end" font-size="11" fill="#2e7d32" font-weight="bold">GPIO6 ROW2</text>
  <rect x="415" y="462" width="50" height="20" rx="4" fill="#2e7d32"/>
  <text x="440" y="476" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">31</text>
  <rect x="535" y="462" width="50" height="20" rx="4" fill="#00897b"/>
  <text x="560" y="476" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">32</text>
  <text x="775" y="476" text-anchor="start" font-size="11" fill="#00796b" font-weight="bold">GPIO12 COL1</text>

  <!-- Row 17: Pin 33 (GPIO13 ROW3) / Pin 34 (GND) -->
  <text x="225" y="500" text-anchor="end" font-size="11" fill="#2e7d32" font-weight="bold">GPIO13 ROW3</text>
  <rect x="415" y="486" width="50" height="20" rx="4" fill="#2e7d32"/>
  <text x="440" y="500" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">33</text>
  <rect x="535" y="486" width="50" height="20" rx="4" fill="#333"/>
  <text x="560" y="500" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">34</text>
  <text x="775" y="500" text-anchor="start" font-size="11" fill="#555">GND</text>

  <!-- Row 18: Pin 35 (GPIO19 ROW4) / Pin 36 (GPIO16 COL2) -->
  <text x="225" y="524" text-anchor="end" font-size="11" fill="#2e7d32" font-weight="bold">GPIO19 ROW4</text>
  <rect x="415" y="510" width="50" height="20" rx="4" fill="#2e7d32"/>
  <text x="440" y="524" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">35</text>
  <rect x="535" y="510" width="50" height="20" rx="4" fill="#00897b"/>
  <text x="560" y="524" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">36</text>
  <text x="775" y="524" text-anchor="start" font-size="11" fill="#00796b" font-weight="bold">GPIO16 COL2</text>

  <!-- Row 19: Pin 37 (GPIO26 EXIT) / Pin 38 (GPIO20 COL3) -->
  <text x="225" y="548" text-anchor="end" font-size="11" fill="#00695c" font-weight="bold">GPIO26 EXIT BTN</text>
  <rect x="415" y="534" width="50" height="20" rx="4" fill="#00695c"/>
  <text x="440" y="548" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">37</text>
  <rect x="535" y="534" width="50" height="20" rx="4" fill="#00897b"/>
  <text x="560" y="548" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">38</text>
  <text x="775" y="548" text-anchor="start" font-size="11" fill="#00796b" font-weight="bold">GPIO20 COL3</text>

  <!-- Row 20: Pin 39 (GND) / Pin 40 (GPIO21 — free) -->
  <text x="225" y="572" text-anchor="end" font-size="11" fill="#555">GND</text>
  <rect x="415" y="558" width="50" height="20" rx="4" fill="#333"/>
  <text x="440" y="572" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">39</text>
  <rect x="535" y="558" width="50" height="20" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5"/>
  <text x="560" y="572" text-anchor="middle" font-size="10" fill="#777" font-weight="bold">40</text>
  <text x="775" y="572" text-anchor="start" font-size="11" fill="#aaa">GPIO21</text>

  <!-- ════════════════════════════════════════ -->
  <!-- Legend -->
  <!-- ════════════════════════════════════════ -->
  <rect x="40" y="668" width="920" height="58" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="500" y="686" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Legend</text>

  <rect x="60" y="698" width="16" height="16" rx="3" fill="#d32f2f"/>
  <text x="82" y="712" font-size="11" fill="#333">Door Relay (12V)</text>

  <rect x="200" y="698" width="16" height="16" rx="3" fill="#e65100"/>
  <text x="222" y="712" font-size="11" fill="#333">Light Relays (220V)</text>

  <rect x="365" y="698" width="16" height="16" rx="3" fill="#1565c0"/>
  <text x="387" y="712" font-size="11" fill="#333">OLED I2C</text>

  <rect x="465" y="698" width="16" height="16" rx="3" fill="#6a1b9a"/>
  <text x="487" y="712" font-size="11" fill="#333">Buzzer</text>

  <rect x="555" y="698" width="16" height="16" rx="3" fill="#2e7d32"/>
  <text x="577" y="712" font-size="11" fill="#333">Keypad Rows</text>

  <rect x="680" y="698" width="16" height="16" rx="3" fill="#00897b"/>
  <text x="702" y="712" font-size="11" fill="#333">Keypad Cols</text>

  <rect x="800" y="698" width="16" height="16" rx="3" fill="#00695c"/>
  <text x="822" y="712" font-size="11" fill="#333">Exit Button</text>
</svg>
